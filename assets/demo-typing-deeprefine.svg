<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 60" width="560" height="60">
  <defs>
    <style>
      /*
        Three-phrase cycle (18s total, infinite):
          Phrase 1 (0–6s):   $ /deeprefine
          Phrase 2 (6–12s):  $ /deeprefine:review "your question"
          Phrase 3 (12–18s): $ /deeprefine:apply "approve changes"

        Per phrase (each = 6s = 33.33% of 18s):
          type   : +0%    → +8.33%
          hold   : +8.33% → +16.67%
          delete : +16.67%→ +25%
          blank  : +25%   → +33.33%

        Cursor is ONLY visible during type+hold+delete of its own phrase.
        During blank gap and all other phrases it is hidden (opacity:0).

        Measured widths (bold 14px Courier New):
          "$ /deeprefine"                        = 109px  → travel = 101px
          "$ /deeprefine:review "your question"" = 302px  → travel = 294px
          "$ /deeprefine:apply "approve changes""= 311px  → travel = 303px
          "$ " prompt = 8px; cursor base x = 14+8 = 22
      */

      /* ── Text clip animations ── */
      @keyframes clip1 {
        0%      { clip-path: inset(0 100% 0 0); }
        8.33%   { clip-path: inset(0 0    0 0); }
        16.67%  { clip-path: inset(0 0    0 0); }
        25%     { clip-path: inset(0 100% 0 0); }
        100%    { clip-path: inset(0 100% 0 0); }
      }
      @keyframes clip2 {
        0%      { clip-path: inset(0 100% 0 0); }
        33.33%  { clip-path: inset(0 100% 0 0); }
        41.67%  { clip-path: inset(0 0    0 0); }
        50%     { clip-path: inset(0 0    0 0); }
        58.33%  { clip-path: inset(0 100% 0 0); }
        100%    { clip-path: inset(0 100% 0 0); }
      }
      @keyframes clip3 {
        0%      { clip-path: inset(0 100% 0 0); }
        66.67%  { clip-path: inset(0 100% 0 0); }
        75%     { clip-path: inset(0 0    0 0); }
        83.33%  { clip-path: inset(0 0    0 0); }
        91.67%  { clip-path: inset(0 100% 0 0); }
        100%    { clip-path: inset(0 100% 0 0); }
      }

      /* ── Cursor slide animations ── */
      @keyframes cur1 {
        0%      { transform: translateX(0);     }
        8.33%   { transform: translateX(101px); }
        16.67%  { transform: translateX(101px); }
        25%     { transform: translateX(0);     }
        100%    { transform: translateX(0);     }
      }
      @keyframes cur2 {
        0%      { transform: translateX(0);     }
        33.33%  { transform: translateX(0);     }
        41.67%  { transform: translateX(294px); }
        50%     { transform: translateX(294px); }
        58.33%  { transform: translateX(0);     }
        100%    { transform: translateX(0);     }
      }
      @keyframes cur3 {
        0%      { transform: translateX(0);     }
        66.67%  { transform: translateX(0);     }
        75%     { transform: translateX(303px); }
        83.33%  { transform: translateX(303px); }
        91.67%  { transform: translateX(0);     }
        100%    { transform: translateX(0);     }
      }

      /*
        Cursor visibility: visible only during own phrase's type+hold+delete window.
        Uses step-start/step-end to snap instantly (no fade).
        Phrase 1: 0% – 25%
        Phrase 2: 33.33% – 58.33%
        Phrase 3: 66.67% – 91.67%
      */
      @keyframes vis1 {
        0%      { opacity: 1; }
        25%     { opacity: 1; }
        25.01%  { opacity: 0; }
        100%    { opacity: 0; }
      }
      @keyframes vis2 {
        0%      { opacity: 0; }
        33.32%  { opacity: 0; }
        33.33%  { opacity: 1; }
        58.33%  { opacity: 1; }
        58.34%  { opacity: 0; }
        100%    { opacity: 0; }
      }
      @keyframes vis3 {
        0%      { opacity: 0; }
        66.66%  { opacity: 0; }
        66.67%  { opacity: 1; }
        91.67%  { opacity: 1; }
        91.68%  { opacity: 0; }
        100%    { opacity: 0; }
      }

      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      .bg    { fill: #1a1b26; }
      .dot-r { fill: #f7768e; opacity: 0.85; }
      .dot-y { fill: #e0af68; opacity: 0.85; }
      .dot-g { fill: #9ece6a; opacity: 0.85; }

      .prompt { font: bold 14px 'Courier New', monospace; fill: #7dcfff; }
      .cmd    { font: bold 14px 'Courier New', monospace; fill: #c0caf5; }
      .sub    { font: bold 14px 'Courier New', monospace; fill: #bb9af7; }
      .args   { font: bold 14px 'Courier New', monospace; fill: #9ece6a; }

      .line1 { animation: clip1 18s ease-in-out infinite; clip-path: inset(0 100% 0 0); }
      .line2 { animation: clip2 18s ease-in-out infinite; clip-path: inset(0 100% 0 0); }
      .line3 { animation: clip3 18s ease-in-out infinite; clip-path: inset(0 100% 0 0); }

      /* Each cursor group: slide + visibility wrapper */
      .cur1g {
        animation: cur1 18s ease-in-out infinite, vis1 18s step-end infinite;
      }
      .cur2g {
        animation: cur2 18s ease-in-out infinite, vis2 18s step-end infinite;
        opacity: 0;
      }
      .cur3g {
        animation: cur3 18s ease-in-out infinite, vis3 18s step-end infinite;
        opacity: 0;
      }

      .cursor-text {
        font: 14px 'Courier New', monospace;
        fill: #c0caf5;
        animation: blink 0.7s infinite;
      }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="560" height="60" rx="8" class="bg"/>
  <rect width="560" height="60" rx="8" fill="none" stroke="#30334d" stroke-width="1.5"/>

  <!-- Traffic-light dots -->
  <circle cx="14" cy="12" r="4.5" class="dot-r"/>
  <circle cx="28" cy="12" r="4.5" class="dot-y"/>
  <circle cx="42" cy="12" r="4.5" class="dot-g"/>

  <!-- ── Phrase 1: $ /deeprefine ── -->
  <text x="14" y="38" class="line1">
    <tspan class="prompt">$ </tspan><tspan class="cmd">/deeprefine</tspan>
  </text>
  <g class="cur1g">
    <text x="22" y="38" class="cursor-text">█</text>
  </g>

  <!-- ── Phrase 2: $ /deeprefine:review "your question" ── -->
  <text x="14" y="38" class="line2">
    <tspan class="prompt">$ </tspan><tspan class="cmd">/deeprefine</tspan><tspan class="sub">:review</tspan><tspan class="args"> "your question"</tspan>
  </text>
  <g class="cur2g">
    <text x="22" y="38" class="cursor-text">█</text>
  </g>

  <!-- ── Phrase 3: $ /deeprefine:apply "approve changes" ── -->
  <text x="14" y="38" class="line3">
    <tspan class="prompt">$ </tspan><tspan class="cmd">/deeprefine</tspan><tspan class="sub">:apply</tspan><tspan class="args"> "approve changes"</tspan>
  </text>
  <g class="cur3g">
    <text x="22" y="38" class="cursor-text">█</text>
  </g>
</svg>
